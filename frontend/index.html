<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Search</title>
  <meta name="description" content="AI-powered entity discovery. Enter a topic and get a structured, sourced table of results." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #20243280;
      --border:     #2a2d3a;
      --text:       #e2e4ed;
      --muted:      #7a7f96;
      --accent:     #5b7fff;
      --accent-h:   #7b9fff;
      --green:      #22c55e;
      --amber:      #f59e0b;
      --radius:     8px;
      --font:       'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    .container { max-width: 1180px; margin: 0 auto; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }
    header p  { color: var(--muted); margin-top: .4rem; font-size: .875rem; }

    /* ── Search bar ── */
    .search-row {
      display: flex; gap: .6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .55rem .75rem;
    }
    #query-input {
      flex: 1; background: none; border: none; outline: none;
      font: inherit; font-size: .975rem; color: var(--text);
    }
    #query-input::placeholder { color: var(--muted); }
    .action-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; padding: .48rem 1.2rem;
      font: inherit; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: background .15s;
      display: flex; align-items: center; gap: .4rem;
    }
    .action-btn:hover    { background: var(--accent-h); }
    .action-btn:disabled { opacity: .45; cursor: not-allowed; }
    .action-btn.green    { background: #16a34a; }
    .action-btn.green:hover { background: #15803d; }

    /* Spinner */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .spinning .spinner { display: inline-block; }
    .spinning .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Example chips ── */
    .chips { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: .85rem; }
    .chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: .28rem .8rem;
      font-size: .78rem; color: var(--muted);
      cursor: pointer; user-select: none;
      transition: border-color .15s, color .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.expand-chip:hover { border-color: var(--green); color: var(--green); }

    /* ── Progress panel ── */
    #progress {
      margin-top: 1.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      display: none;
    }
    #progress h2 {
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: .75rem;
    }
    .phase-row {
      display: flex; gap: .65rem; align-items: flex-start;
      padding: .4rem 0; border-bottom: 1px solid var(--border);
      font-size: .875rem;
    }
    .phase-row:last-child { border-bottom: none; }
    .phase-icon { width: 1.2rem; text-align: center; flex-shrink: 0; }
    .phase-msg  { color: var(--text); }
    .phase-detail { color: var(--muted); font-size: .77rem; margin-top: .12rem; word-break: break-word; }

    /* ── Results ── */
    #results { margin-top: 2rem; display: none; }
    .results-hd {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap;
      gap: .5rem; margin-bottom: 1rem;
    }
    .results-hd h2 { font-size: .975rem; font-weight: 600; }
    .results-meta  { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
    .export-group { display: flex; gap: .4rem; }
    .export-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: .38rem .9rem;
      color: var(--muted); font: inherit; font-size: .82rem;
      cursor: pointer; transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .export-btn:hover       { border-color: var(--accent); color: var(--text); }
    .export-btn.excel:hover { border-color: #22c55e; color: #22c55e; }

    /* ── Expand panel ── */
    #expand-panel {
      margin-bottom: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .85rem 1rem;
      display: none;
    }
    #expand-panel .expand-label {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin-bottom: .6rem;
      display: flex; align-items: center; gap: .4rem;
    }
    #expand-panel .expand-label span { font-size: .8rem; }
    .expand-row {
      display: flex; gap: .5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .45rem .7rem;
      transition: border-color .2s;
    }
    .expand-row:focus-within {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(34,197,94,.1);
    }
    #expand-input {
      flex: 1; background: none; border: none; outline: none;
      font: inherit; font-size: .9rem; color: var(--text);
    }
    #expand-input::placeholder { color: var(--muted); }
    .expand-suggestions {
      display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .6rem;
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    thead th {
      background: var(--surface); padding: .65rem 1rem;
      text-align: left; white-space: nowrap;
      font-weight: 500; font-size: .73rem;
      text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
      transition: color .15s;
    }
    thead th:hover  { color: var(--text); }
    thead th.sorted { color: var(--accent); }
    thead th.new-col {
      color: var(--green);
      animation: col-flash 1.5s ease forwards;
    }
    @keyframes col-flash {
      0%   { background: rgba(34,197,94,.18); }
      100% { background: var(--surface); }
    }
    .sort-arrow { margin-left: .25rem; opacity: .4; }
    .sorted .sort-arrow { opacity: 1; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(91,127,255,.05); }
    tbody td { padding: .6rem 1rem; vertical-align: top; }
    tbody td.new-cell {
      animation: cell-flash 1.5s ease forwards;
    }
    @keyframes cell-flash {
      0%   { background: rgba(34,197,94,.10); }
      100% { background: transparent; }
    }
    .name-cell { font-weight: 500; }
    .empty     { color: var(--muted); }

    /* Source link */
    .src {
      display: inline-block; margin-left: .35rem;
      font-size: .7rem; color: var(--accent);
      text-decoration: none; vertical-align: middle;
      position: relative;
    }
    .src:hover .tip { display: block; }
    .tip {
      display: none; position: absolute;
      bottom: 1.3rem; left: 50%; transform: translateX(-50%);
      background: #252836; border: 1px solid var(--border);
      border-radius: 6px; padding: .35rem .55rem;
      font-size: .7rem; color: var(--text);
      white-space: nowrap; z-index: 20; pointer-events: none;
      max-width: 260px; white-space: normal;
    }
    
    .low-confidence {
      border-bottom: 1px dashed orange;
      cursor: help;
    }
    
    .warn-icon {
      margin-left: .3rem;
      font-size: .75rem;
      cursor: help;
    }

    /* ── Error ── */
    .error {
      margin-top: 1.5rem;
      background: rgba(248,113,113,.08);
      border: 1px solid #f87171;
      border-radius: var(--radius);
      padding: .75rem 1rem;
      color: #f87171; font-size: .875rem;
      display: none;
    }

    /* ── Expand status toast ── */
    #expand-status {
      font-size: .78rem; color: var(--muted);
      margin-top: .5rem; min-height: 1.1rem;
      transition: color .2s;
    }
    #expand-status.ok    { color: var(--green); }
    #expand-status.error { color: #f87171; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Agentic <span>Search</span></h1>
    <p>Enter a topic → AI plans searches → scrapes the web → extracts a structured table</p>
    <p style="font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem;">Built by Rishiraj Girmal</p>
  </header>

  <!-- Search -->
  <div class="search-row">
    <input id="query-input" type="text"
           placeholder="e.g. AI startups in healthcare, top pizza places in Brooklyn…"
           autocomplete="off" />
    <button id="search-btn" class="action-btn" onclick="startSearch()">
      <span class="spinner"></span>
      <span class="btn-label">Search</span>
    </button>
  </div>

  <div class="chips">
    <span class="chip" onclick="setQuery('AI startups in healthcare')">AI startups in healthcare</span>
    <span class="chip" onclick="setQuery('top pizza places in Brooklyn')">Top pizza in Brooklyn</span>
    <span class="chip" onclick="setQuery('open source database tools')">Open source databases</span>
    <span class="chip" onclick="setQuery('Python web frameworks comparison')">Python web frameworks</span>
    <span class="chip" onclick="setQuery('venture capital firms in New York')">VC firms in New York</span>
  </div>

  <!-- Progress -->
  <div id="progress">
    <h2>Pipeline progress</h2>
    <div id="phase-list"></div>
  </div>

  <!-- Error -->
  <div id="error-box" class="error"></div>

  <!-- Results -->
  <section id="results">
    <div class="results-hd">
      <div>
        <h2 id="results-title"></h2>
        <div class="results-meta" id="results-meta"></div>
      </div>
      <div class="export-group">
        <button class="export-btn" id="export-json-btn" onclick="exportJSON()" title="Download as JSON">↓ JSON</button>
        <button class="export-btn excel" id="export-excel-btn" onclick="exportExcel()" title="Download as Excel spreadsheet">↓ Excel</button>
      </div>
    </div>

    <!-- ── Expand panel ── -->
    <div id="expand-panel">
      <div class="expand-label">
        <span>✦</span> Expand table — add more columns
      </div>
      <div class="expand-row">
        <input id="expand-input" type="text"
               placeholder="e.g. ceo_name, valuation, founded_year, employee_count"
               autocomplete="off" />
        <button id="expand-btn" class="action-btn green" onclick="startExpand()">
          <span class="spinner"></span>
          <span class="btn-label">Expand</span>
        </button>
      </div>
      <div class="expand-suggestions" id="expand-suggestions"></div>
      <div id="expand-status"></div>
    </div>

    <div class="table-wrap">
      <table id="tbl">
        <thead id="tbl-head"></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </section>

</div>
<script>
/* ── State ── */
let current = null;
let sortCol = null, sortAsc = true;

/* ── Column suggestion sets (keyed by common column names) ── */
const SUGGEST_MAP = {
  // Business / startup
  headquarters:    ['ceo_name','valuation','employee_count','founded_year','funding_stage','revenue'],
  founded_year:    ['ceo_name','valuation','employee_count','headquarters','funding_stage'],
  funding_stage:   ['valuation','total_funding','investors','ceo_name','employee_count'],
  valuation:       ['revenue','employee_count','ceo_name','founded_year','headquarters'],
  ceo:             ['founded_year','headquarters','valuation','employee_count'],
  // Food / places
  rating:          ['price_range','address','cuisine','phone','hours','delivery'],
  cuisine:         ['rating','price_range','address','hours','reservations'],
  price_range:     ['rating','cuisine','address','phone','hours'],
  // Tech tools
  license:         ['language','github_stars','latest_version','description','maintainer'],
  github_stars:    ['license','language','latest_version','description'],
  language:        ['license','github_stars','latest_version','description'],
  // Generic fallbacks
  description:     ['website','contact','category','tags'],
  website:         ['contact','category','description'],
};

/* ── Helpers ── */
function setQuery(q) {
  document.getElementById('query-input').value = q;
  document.getElementById('query-input').focus();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const ICONS = {
  planning:'🧠', searching:'🔍', scraping:'📄',
  extracting:'⚙️', merging:'🔗', expanding:'✦', done:'✅'
};

function upsertPhase(phase, message, detail) {
  let row = document.getElementById('ph-' + phase);
  if (!row) {
    row = document.createElement('div');
    row.className = 'phase-row';
    row.id = 'ph-' + phase;
    document.getElementById('phase-list').appendChild(row);
  }
  row.innerHTML =
    `<div class="phase-icon">${ICONS[phase] || '•'}</div>` +
    `<div><div class="phase-msg">${esc(message)}</div>` +
    (detail ? `<div class="phase-detail">${esc(detail)}</div>` : '') +
    `</div>`;
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

/* ── Suggestion chips ── */
function buildExpandSuggestions(columns) {
  const used = new Set(columns.map(c => c.toLowerCase()));
  const suggested = new Set();

  columns.forEach(col => {
    const key = Object.keys(SUGGEST_MAP).find(k => col.toLowerCase().includes(k));
    if (key) {
      SUGGEST_MAP[key].forEach(s => {
        if (!used.has(s)) suggested.add(s);
      });
    }
  });

  // Fallback generic suggestions if nothing matched
  if (suggested.size === 0) {
    ['website','description','category','contact','tags'].forEach(s => {
      if (!used.has(s)) suggested.add(s);
    });
  }

  const container = document.getElementById('expand-suggestions');
  container.innerHTML = '';
  [...suggested].slice(0, 8).forEach(col => {
    const chip = document.createElement('span');
    chip.className = 'chip expand-chip';
    chip.textContent = col.replace(/_/g, ' ');
    chip.onclick = () => appendExpandInput(col);
    container.appendChild(chip);
  });
}

function appendExpandInput(col) {
  const inp = document.getElementById('expand-input');
  const existing = inp.value.split(',').map(s => s.trim()).filter(Boolean);
  if (!existing.includes(col)) {
    existing.push(col);
    inp.value = existing.join(', ');
  }
  inp.focus();
}

/* ── Table ── */
function renderTable(r) {
  current = r;
  document.getElementById('results-title').textContent = `Results for "${r.query}"`;
  
  let costStr = "";
  if (r.llm_tokens && r.llm_cost) {
      costStr = ` · 💸 Cost: $${r.llm_cost.toFixed(3)} (${r.llm_tokens.toLocaleString()} tokens)`;
  }
  
  document.getElementById('results-meta').textContent =
    `${r.entities.length} entities · ${r.total_pages_scraped} pages scraped · ${r.total_sources} URLs found${costStr}`;

  // Header
  const head = document.getElementById('tbl-head');
  head.innerHTML = '<tr>' + r.columns.map(col =>
    `<th id="th-${esc(col)}" onclick="sortBy('${esc(col)}')">`+
    `${col.replace(/_/g,' ')}<span class="sort-arrow">↕</span></th>`
  ).join('') + '</tr>';

  drawRows(r.entities, r.columns);
  document.getElementById('results').style.display = 'block';
  document.getElementById('expand-panel').style.display = 'block';
  buildExpandSuggestions(r.columns);
}

function drawRows(entities, columns) {
  const body = document.getElementById('tbl-body');
  body.innerHTML = '';
  entities.forEach((e, i) => {
    const tr = document.createElement('tr');
    tr.id = `row-${i}`;
    columns.forEach(col => {
      const td = document.createElement('td');
      td.id = `cell-${i}-${col}`;
      renderCell(td, e, col);
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

function renderCell(td, entity, col) {
  if (col === 'name') {
    td.className = 'name-cell';
    td.textContent = entity.name;
  } else {
    const a = entity.attributes[col];
    if (a) {
      const isLowConf = a.confidence !== undefined && a.confidence < 0.8;
      const confTitle = isLowConf ? ` title="Low Confidence (${Math.round(a.confidence * 100)}%)"` : '';
      const displayVal = isLowConf 
          ? `<span class="low-confidence"${confTitle}>${esc(a.value)}</span><span class="warn-icon"${confTitle}>⚠️</span>` 
          : esc(a.value);
          
      td.innerHTML = displayVal +
        `<a class="src" href="${esc(a.source_url)}" target="_blank" rel="noopener">[↗]` +
        `<span class="tip">${esc(a.source_title)}<br/><span style="color:var(--muted)">${esc(a.source_url)}</span></span></a>`;
    } else {
      td.innerHTML = '<span class="empty">—</span>';
    }
  }
}

function sortBy(col) {
  if (!current) return;
  sortAsc = (sortCol === col) ? !sortAsc : true;
  sortCol = col;

  current.columns.forEach(c => {
    const th = document.getElementById('th-' + c);
    if (!th) return;
    th.classList.toggle('sorted', c === col);
    th.querySelector('.sort-arrow').textContent = (c === col) ? (sortAsc ? '↑' : '↓') : '↕';
  });

  const sorted = [...current.entities].sort((a, b) => {
    const va = col === 'name' ? a.name : (a.attributes[col]?.value ?? '');
    const vb = col === 'name' ? b.name : (b.attributes[col]?.value ?? '');
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  drawRows(sorted, current.columns);
}

/* ── Live column injection (no full re-render) ── */
function injectNewColumns(expandResult) {
  const newCols = expandResult.new_columns;
  const entityMap = {};
  expandResult.entities.forEach(e => { entityMap[e.name] = e; });

  // 1. Add <th> headers
  const headerRow = document.getElementById('tbl-head').querySelector('tr');
  newCols.forEach(col => {
    if (document.getElementById('th-' + col)) return; // already exists
    const th = document.createElement('th');
    th.id = 'th-' + col;
    th.className = 'new-col';
    th.onclick = () => sortBy(col);
    th.innerHTML = `${col.replace(/_/g, ' ')}<span class="sort-arrow">↕</span>`;
    headerRow.appendChild(th);
  });

  // 2. Add <td> cells to every row
  const body = document.getElementById('tbl-body');
  const rows = body.querySelectorAll('tr');
  rows.forEach((tr, i) => {
    const entityName = tr.querySelector('.name-cell')?.textContent;
    const entity = entityMap[entityName];
    if (!entity) return;

    newCols.forEach(col => {
      if (document.getElementById(`cell-${i}-${col}`)) return; // already present
      const td = document.createElement('td');
      td.id = `cell-${i}-${col}`;
      td.className = 'new-cell';
      renderCell(td, entity, col);
      tr.appendChild(td);
    });
  });

  // 3. Update current state
  current.columns = expandResult.columns;
  current.entities = expandResult.entities;

  if (expandResult.llm_tokens) {
      current.llm_tokens = (current.llm_tokens || 0) + expandResult.llm_tokens;
      current.llm_cost = (current.llm_cost || 0.0) + expandResult.llm_cost;

      let costStr = ` · 💸 Cost: $${current.llm_cost.toFixed(3)} (${current.llm_tokens.toLocaleString()} tokens)`;
      document.getElementById('results-meta').textContent =
        `${current.entities.length} entities · ${current.total_pages_scraped} pages scraped · ${current.total_sources} URLs found${costStr}`;
  }

  // 4. Rebuild suggestion chips excluding newly-added cols
  buildExpandSuggestions(current.columns);
}

/* ── Export ── */
function exportJSON() {
  if (!current) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(
    new Blob([JSON.stringify(current, null, 2)], {type: 'application/json'})
  );
  a.download = slugify(current.query) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function exportExcel() {
  if (!current || !window.XLSX) {
      if (!window.XLSX) showError("Excel exporter library failed to load");
      return;
  }
  const header = current.columns.map(c => c.replace(/_/g, ' '));
  const rows = current.entities.map(e =>
    current.columns.map(col => {
      if (col === 'name') return e.name;
      const a = e.attributes[col];
      if (!a) return '';
      if (a.confidence !== undefined && a.confidence < 0.8) {
        return `${a.value} (Low Confidence)`;
      }
      return a.value;
    })
  );
  const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
  ws['!cols'] = header.map((h, i) => {
    const maxLen = Math.max(h.length, ...rows.map(r => String(r[i] || '').length));
    return { wch: Math.min(maxLen + 2, 50) };
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Results');
  
  const meta = [
    ['Query', current.query || ''],
    ['Entities found', current.entities.length || 0],
    ['Pages scraped', current.total_pages_scraped || 0],
    ['Sources found', current.total_sources || 0],
    ['LLM Tokens Consumed', current.llm_tokens || 0],
    ['LLM Estimated Cost', current.llm_cost ? '$' + current.llm_cost.toFixed(4) : '$0.00'],
    ['Exported at', new Date().toISOString()],
  ];
  const wsMeta = XLSX.utils.aoa_to_sheet(meta);
  wsMeta['!cols'] = [{ wch: 18 }, { wch: 40 }];
  XLSX.utils.book_append_sheet(wb, wsMeta, 'Metadata');
  XLSX.writeFile(wb, slugify(current.query) + '.xlsx');
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || 'agentic_search';
}

/* ── Main SSE flow ── */
function startSearch() {
  const q = document.getElementById('query-input').value.trim();
  if (!q) return;

  // Reset
  document.getElementById('phase-list').innerHTML = '';
  document.getElementById('progress').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('expand-panel').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  setSearchBusy(true);
  current = null;

  const es = new EventSource('/api/search?q=' + encodeURIComponent(q));

  es.addEventListener('phase', ev => {
    const d = JSON.parse(ev.data);
    upsertPhase(d.phase, d.message, d.detail);
  });

  es.addEventListener('result', ev => {
    renderTable(JSON.parse(ev.data));
  });

  es.addEventListener('error', ev => {
    const d = JSON.parse(ev.data || '{}');
    showError(d.message || 'Something went wrong.');
    es.close();
    setSearchBusy(false);
  });

  es.addEventListener('done', () => {
    upsertPhase('done', 'Done', '');
    es.close();
    setSearchBusy(false);
  });

  es.onerror = () => {
    showError('Connection lost. Is the backend running?');
    es.close();
    setSearchBusy(false);
  };
}

/* ── Expand SSE flow ── */
function startExpand() {
  if (!current) return;
  const raw = document.getElementById('expand-input').value.trim();
  if (!raw) return;

  // Normalise to snake_case
  const newCols = raw
    .split(',')
    .map(s => s.trim().toLowerCase().replace(/\s+/g, '_'))
    .filter(Boolean);

  if (!newCols.length) return;

  setExpandBusy(true);
  setExpandStatus('');

  const params = new URLSearchParams({
    q: current.query,
    new_columns: newCols.join(','),
  });
  const es = new EventSource('/api/expand?' + params.toString());

  es.addEventListener('phase', ev => {
    const d = JSON.parse(ev.data);
    // Show expanding phases in the progress panel (keep it open)
    document.getElementById('progress').style.display = 'block';
    upsertPhase(d.phase, d.message, d.detail);
    setExpandStatus(d.message);
  });

  es.addEventListener('expand_result', ev => {
    const d = JSON.parse(ev.data);
    injectNewColumns(d);
    const filled = d.cells_filled;
    setExpandStatus(`✔ Done — ${filled} cell${filled !== 1 ? 's' : ''} filled across ${d.new_columns.length} new column${d.new_columns.length !== 1 ? 's' : ''}`, 'ok');
    document.getElementById('expand-input').value = '';
  });

  es.addEventListener('error', ev => {
    const d = JSON.parse(ev.data || '{}');
    setExpandStatus('⚠ ' + (d.message || 'Something went wrong.'), 'error');
    es.close();
    setExpandBusy(false);
  });

  es.addEventListener('done', () => {
    es.close();
    setExpandBusy(false);
  });

  es.onerror = () => {
    setExpandStatus('⚠ Connection lost during expand.', 'error');
    es.close();
    setExpandBusy(false);
  };
}

/* ── UI helpers ── */
function setSearchBusy(busy) {
  const btn = document.getElementById('search-btn');
  btn.disabled = busy;
  btn.classList.toggle('spinning', busy);
}

function setExpandBusy(busy) {
  const btn = document.getElementById('expand-btn');
  btn.disabled = busy;
  btn.classList.toggle('spinning', busy);
  document.getElementById('expand-input').disabled = busy;
}

function setExpandStatus(msg, cls) {
  const el = document.getElementById('expand-status');
  el.textContent = msg;
  el.className = cls || '';
}

/* ── Keyboard shortcuts ── */
document.getElementById('query-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSearch();
});
document.getElementById('expand-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startExpand();
});
</script>
